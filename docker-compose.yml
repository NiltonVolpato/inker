services:
  inker:
    build:
      context: .
      args:
        DB_PROVIDER: ${DB_PROVIDER:-postgresql}
        VITE_AUTH_ENABLED: ${VITE_AUTH_ENABLED:-true}
    image: ${INKER_IMAGE:-inker:latest}
    container_name: inker
    restart: unless-stopped
    ports:
      - "${INKER_PORT:-80}:80"
    volumes:
      - ./data/postgres:/var/lib/postgresql
      - ./data/db:/app/data
      - ./data/redis:/data
      - ./data/uploads:/app/uploads
    environment:
      TZ: ${TZ:-UTC}
      ADMIN_PIN: "${ADMIN_PIN:-1111}"
      INKER_PORT: "${INKER_PORT:-80}"
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-UTC}
      DB_PROVIDER: ${DB_PROVIDER:-postgresql}
      DATABASE_URL: ${DATABASE_URL}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      VITE_AUTH_ENABLED: ${VITE_AUTH_ENABLED:-true}
      API_URL: ${API_URL:-}
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://127.0.0.1/health');process.exit(r.ok?0:1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

